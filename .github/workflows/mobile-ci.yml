name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "api/openapi.yaml"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    # paths フィルターを外す
    # → PRでは常にジョブを起動してステータスを報告し、ブランチ保護ルールを満たす
    # → モバイル変更がないPRは内部の paths-filter でステップをスキップして高速に通過する

permissions:
  contents: read
  pull-requests: read  # dorny/paths-filter が PR の差分を GitHub API 経由で取得するために必要

# 同一 PR で連続 push した際に e2e ジョブ同士が並走し、e2e-screenshots ブランチへの
# push がバイナリ PNG の add/add コンフリクトで競合するのを防ぐ。
# PR は古い run をキャンセルして最新だけ走らせる。main push はベースライン更新を
# 取りこぼさないようキャンセルせず直列に待たせる
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: ESLint / TypeScript / Jest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect mobile changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile:
              - 'mobile/**'
              - 'api/openapi.yaml'
              - '.github/workflows/mobile-ci.yml'

      - name: Set up Node.js
        if: steps.filter.outputs.mobile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        if: steps.filter.outputs.mobile == 'true'
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Generate API client (TypeScript)
        if: steps.filter.outputs.mobile == 'true'
        working-directory: mobile
        run: npm run generate:api

      - name: ESLint
        if: steps.filter.outputs.mobile == 'true'
        working-directory: mobile
        run: npm run lint

      - name: TypeScript type check
        if: steps.filter.outputs.mobile == 'true'
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Jest
        if: steps.filter.outputs.mobile == 'true'
        working-directory: mobile
        run: npx jest --passWithNoTests

  e2e:
    name: Maestro E2E (iOS Simulator)
    runs-on: macos-14
    needs: ci
    # iOS の Release ビルドは実測約29分（run 28521747001）。余裕を持って2時間確保する
    timeout-minutes: 120
    permissions:
      contents: write # e2e-screenshots ブランチへのスクリーンショット push
      pull-requests: write # VRT 結果コメントの投稿

    steps:
      - uses: actions/checkout@v4

      - name: Detect mobile changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile:
              - 'mobile/**'
              - 'api/openapi.yaml'
              - '.github/workflows/mobile-ci.yml'
            e2e:
              - 'mobile/.maestro/**'
              - '.github/workflows/mobile-ci.yml'

      # E2E は iOS Release ビルドに約30分かかり macOS ランナーで高コストなため、
      # PR では E2E フロー自体（.maestro/**）か本ワークフローに変更がある場合のみ実行する。
      # アプリコードの変更による回帰は main への push 時（従来どおり mobile/** 全体）で検知する。
      - name: Decide whether to run E2E
        id: decide
        run: |
          if [ "${{ steps.filter.outputs.e2e }}" = "true" ] \
            || { [ "${{ github.event_name }}" = "push" ] && [ "${{ steps.filter.outputs.mobile }}" = "true" ]; }; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      # Expo SDK 53 は Xcode 16 以降が必須（macos-14 ランナーのデフォルトは Xcode 15.4）。
      # 既定のまま prebuild/build すると expo-modules-core の SwiftUI コード
      # （onGeometryChange, iOS 17 SDK以降が必要）がコンパイルできず失敗する。
      - name: Select Xcode 16
        if: steps.decide.outputs.run == 'true'
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Set up Node.js
        if: steps.decide.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        if: steps.decide.outputs.run == 'true'
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Generate API client (TypeScript)
        if: steps.decide.outputs.run == 'true'
        working-directory: mobile
        run: npm run generate:api

      - name: Install Maestro CLI
        if: steps.decide.outputs.run == 'true'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Prebuild iOS native project
        if: steps.decide.outputs.run == 'true'
        working-directory: mobile
        run: npx expo prebuild --platform ios

      # expo run:ios はアプリ起動後もログを流し続けて終了しないため CI では使わない
      # （run 28521747001 で Maestro ステップに到達できずタイムアウトした敗因）。
      # 「終了するコマンドの連鎖」に分解する: xcodebuild → simctl boot → simctl install
      #
      # - Release 構成で JS バンドルをビルド時に静的に埋め込むため、Metro の起動が不要
      # - EXPO_PUBLIC_MOCK_START_EMPTY は xcodebuild の "Bundle React Native code and images"
      #   フェーズでバンドルにインライン化されるため、このステップの env で渡す
      # - シミュレータビルドはコード署名不要（CODE_SIGNING_ALLOWED=NO）
      # - app.json の name が日本語のため、生成される workspace / scheme 名は決め打ちせず
      #   prebuild の生成物から動的に取得する
      - name: Build app for iOS Simulator (Release)
        if: steps.decide.outputs.run == 'true'
        timeout-minutes: 110
        working-directory: mobile/ios
        env:
          EXPO_PUBLIC_MOCK_START_EMPTY: "true"
        run: |
          set -o pipefail
          command -v xcbeautify >/dev/null || brew install -q xcbeautify
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(basename "$(ls -d *.xcodeproj | head -n 1)" .xcodeproj)
          echo "workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release -sdk iphonesimulator \
            -derivedDataPath build \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --quiet

      # VRT（ベースライン画像との差分比較）のため機種を固定する。機種が変わると解像度が
      # 変わり、全スクリーンショットが差分として検出されてしまう。
      # ランナーイメージ更新でランタイムから機種が消える場合に備えて優先順リストで解決し、
      # どれも無い場合のみ従来どおり「available な最初の iPhone」にフォールバックする
      - name: Boot iOS Simulator
        if: steps.decide.outputs.run == 'true'
        run: |
          # 同名機種が複数の iOS ランタイムに存在しうる（ランナーイメージによる）ため、
          # ランタイムキー（例: com.apple.CoreSimulator.SimRuntime.iOS-18-2）の降順ソートで
          # 最新ランタイムから優先的に探し、main と PR で同じ iOS バージョンに決定的に解決する
          UDID=""
          for NAME in "iPhone 16" "iPhone 16 Pro" "iPhone 15"; do
            UDID=$(xcrun simctl list devices available --json \
              | jq -r --arg n "$NAME" \
                '[.devices | to_entries | sort_by(.key) | reverse | .[].value[] | select(.name == $n)][0].udid // empty')
            if [ -n "$UDID" ]; then
              echo "Simulator device: $NAME"
              break
            fi
          done
          if [ -z "$UDID" ]; then
            echo "::warning::VRT 用の固定機種が見つかりません。解像度が変わりベースラインと全画面差分になる可能性があります"
            UDID=$(xcrun simctl list devices available --json \
              | jq -r '[.devices | to_entries | sort_by(.key) | reverse | .[].value[] | select(.name | startswith("iPhone"))][0].udid')
            # フォールバック機種の解像度で main のベースラインを静かに上書きしないよう、
            # publish ステップに伝えてベースライン更新をスキップさせる
            echo "SIMULATOR_DEVICE_FALLBACK=true" >> "$GITHUB_ENV"
          fi
          echo "Booting simulator: $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          # inputText 直後に QuickPath（なぞり入力）のチュートリアルオーバーレイが
          # 全画面に出現し、後続のタップを吸ってフローが失敗する（run 28698159722 の
          # スクリーンショットで確認）。「表示済み」を事前に書き込んで抑止する。
          # 予測変換・自動修正も inputText の入力内容を汚しうるため無効化する
          xcrun simctl spawn "$UDID" defaults write com.apple.keyboard.preferences DidShowContinuousPathIntroduction -bool true
          xcrun simctl spawn "$UDID" defaults write com.apple.keyboard.preferences DidShowGestureKeyboardIntroduction -bool true
          xcrun simctl spawn "$UDID" defaults write com.apple.Preferences KeyboardAutocorrection -bool false
          xcrun simctl spawn "$UDID" defaults write com.apple.Preferences KeyboardPrediction -bool false
          # VRT のためステータスバーを固定する（時刻・バッテリー残量は実行ごとに変わり、
          # ピクセル比較で毎回差分になってしまう）
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" --dataNetwork wifi --wifiBars 3 \
            --batteryState charged --batteryLevel 100 --cellularBars 4
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      # アプリの起動は Maestro フロー先頭の launchApp が行うため、install まででよい
      - name: Install app on simulator
        if: steps.decide.outputs.run == 'true'
        run: xcrun simctl install "$SIMULATOR_UDID" mobile/ios/build/Build/Products/Release-iphonesimulator/*.app

      - name: Run Maestro E2E flows
        id: maestro
        if: steps.decide.outputs.run == 'true'
        working-directory: mobile
        run: |
          mkdir -p .maestro/screenshots
          # flows/ 配下の全フローを実行する（フロー追加時にワークフロー修正を不要にする）
          maestro test .maestro/flows --format junit --output .maestro/report.xml

      - name: Upload E2E screenshots
        if: always() && steps.decide.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          # takeScreenshot の相対パスは Maestro 実行時の CWD（mobile/）基準で解決される。
          # フロー側は .maestro/screenshots/ を指定しているが、Maestro のバージョン差異に
          # 備えて CWD 直下の screenshots/ もフォールバックとして含める
          path: |
            mobile/.maestro/screenshots/*.png
            mobile/screenshots/*.png
          if-no-files-found: warn

      - name: Upload crash diagnostics
        if: failure() && steps.decide.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: crash-diagnostics
          path: ~/Library/Logs/DiagnosticReports/
          if-no-files-found: ignore

      - name: Upload E2E test report
        if: always() && steps.decide.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: mobile/.maestro/report.xml
          if-no-files-found: warn

      # ビジュアルリグレッション（issue #174）:
      # スクリーンショットを orphan ブランチ e2e-screenshots に保存し、
      # - main push: ベースライン（baseline/）を更新（全フロー成功時のみ。失敗時の
      #   部分的なスクショでベースラインを壊さない）
      # - PR: reg-cli でベースラインと比較し、actual/diff を pr-<番号>/ に push して
      #   sticky コメント（マーカーで upsert）に画像をインライン表示する
      # fork からの PR は GITHUB_TOKEN が read-only のためスキップする
      - name: Publish screenshots & visual regression report
        if: >-
          always() && steps.decide.outputs.run == 'true' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAESTRO_STATUS: ${{ steps.maestro.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # マーカー付きの既存コメントがあれば更新、なければ新規作成（sticky コメント）。
          # --paginate は「ページごと」に --jq が走るため、マーカー付きコメントが複数ページに
          # またがると ID が複数行で返りうる → head -n 1 で先頭の1件のみ使う
          upsert_sticky_comment() {
            local body_file="$1" existing
            existing=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
              --jq '[.[] | select(.body | startswith("<!-- e2e-vrt-report -->"))][0].id // empty' | head -n 1)
            if [ -n "$existing" ]; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -F body=@"$body_file" > /dev/null
            else
              gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -F body=@"$body_file" > /dev/null
            fi
          }

          # 撮影されたスクショを収集（フォールバックの CWD 直下 screenshots/ も統合）
          ACTUAL_SRC="$RUNNER_TEMP/actual"
          mkdir -p "$ACTUAL_SRC"
          cp mobile/.maestro/screenshots/*.png "$ACTUAL_SRC"/ 2>/dev/null || true
          cp mobile/screenshots/*.png "$ACTUAL_SRC"/ 2>/dev/null || true
          if [ -z "$(ls "$ACTUAL_SRC")" ]; then
            echo "::warning::スクリーンショットが1枚もないため VRT をスキップします"
            # PR では exit だけすると前回 run のコメントが「最新の結果」のまま残ってしまうため、
            # スクショ0枚だった旨で sticky コメントを更新してから終了する
            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              {
                echo "<!-- e2e-vrt-report -->"
                echo "## 📸 E2E スクリーンショット / ビジュアルリグレッション"
                echo ""
                echo "> [!WARNING]"
                echo "> 今回の run ではスクリーンショットが撮影されませんでした（E2E が撮影前に失敗した可能性があります）。"
                echo ""
                echo "[workflow run](${RUN_URL})"
              } > "$RUNNER_TEMP/comment.md"
              upsert_sticky_comment "$RUNNER_TEMP/comment.md"
            fi
            exit 0
          fi

          # e2e-screenshots ブランチを取得（初回はブランチごと作成）。
          # --filter=blob:none（partial clone）: blob はチェックアウトに必要な分だけ取得しつつ
          # 履歴は完全に持つ。--depth 1 だと grafted HEAD が全パスを「触った」扱いになり、
          # 後段の git log -1 -- baseline が常に HEAD を返してベースラインの SHA を誤るため使わない
          SHOTS_DIR="$RUNNER_TEMP/e2e-screenshots"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # clone の失敗（ネットワークエラー等）を「ブランチが無い」と混同しないよう、
          # 先に ls-remote でブランチの存在を確認する（--exit-code: ref が無い場合のみ exit 2）
          set +e
          git ls-remote --exit-code --heads "$REPO_URL" e2e-screenshots > /dev/null
          LS_REMOTE_STATUS=$?
          set -e
          if [ "$LS_REMOTE_STATUS" -eq 0 ]; then
            # ブランチが存在するのに clone に失敗した場合はステップごと失敗させる
            git clone --filter=blob:none --branch e2e-screenshots "$REPO_URL" "$SHOTS_DIR"
          elif [ "$LS_REMOTE_STATUS" -eq 2 ]; then
            mkdir -p "$SHOTS_DIR"
            git -C "$SHOTS_DIR" init -b e2e-screenshots
            git -C "$SHOTS_DIR" remote add origin "$REPO_URL"
          else
            echo "::error::e2e-screenshots ブランチの存在確認（git ls-remote）に失敗しました（exit ${LS_REMOTE_STATUS}）"
            exit 1
          fi
          git -C "$SHOTS_DIR" config user.name "github-actions[bot]"
          git -C "$SHOTS_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 同一ブランチへの並行 push に備えたリトライ付き push。
          # バイナリ PNG の add/add コンフリクトは rebase では解決できないため、失敗したら
          # origin の最新に reset --hard してから自分の変更（引数の関数 = 該当ディレクトリの
          # 差し替え＋コミット）を作り直し、push し直す（最大3回）
          push_with_retry() {
            local apply_changes="$1" attempt
            for attempt in 1 2 3; do
              if git -C "$SHOTS_DIR" push origin e2e-screenshots; then
                return 0
              fi
              echo "push が競合しました（${attempt}/3）。origin の最新へ載せ替えて再試行します"
              git -C "$SHOTS_DIR" fetch origin e2e-screenshots
              git -C "$SHOTS_DIR" reset --hard origin/e2e-screenshots
              "$apply_changes"
            done
            echo "::error::e2e-screenshots への push に3回失敗しました"
            return 1
          }

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            # main: 全フロー成功時のみベースラインを更新する
            if [ "$MAESTRO_STATUS" != "success" ]; then
              echo "E2E が失敗したためベースラインは更新しません（前回のベースラインを維持）"
              exit 0
            fi
            # フォールバック機種（Boot ステップ参照）で撮影した場合、解像度の異なる画像で
            # ベースラインを静かに上書きしてしまうため更新しない
            if [ "${SIMULATOR_DEVICE_FALLBACK:-false}" = "true" ]; then
              echo "::warning::フォールバック機種で撮影されたためベースラインは更新しません（前回のベースラインを維持）"
              exit 0
            fi
            apply_baseline() {
              rm -rf "${SHOTS_DIR:?}/baseline"
              mkdir -p "$SHOTS_DIR/baseline"
              cp "$ACTUAL_SRC"/*.png "$SHOTS_DIR/baseline/"
              git -C "$SHOTS_DIR" add -A
              git -C "$SHOTS_DIR" commit -m "baseline: update from ${GITHUB_SHA}" || echo "ベースラインに変更なし"
            }
            apply_baseline
            push_with_retry apply_baseline
            exit 0
          fi

          # PR: ベースラインと比較して結果を push し、コメントを upsert する
          # 初回（ベースライン未生成）の判定はディレクトリの実在で行う
          PR_DIR="pr-${PR_NUMBER}"
          if [ -n "$(ls -A "$SHOTS_DIR/baseline" 2>/dev/null)" ]; then
            BASELINE_SHA=$(git -C "$SHOTS_DIR" log -1 --format=%h -- baseline 2>/dev/null || true)
            BASELINE_SHA=${BASELINE_SHA:-$(git -C "$SHOTS_DIR" rev-parse --short HEAD)}
          else
            BASELINE_SHA=""
          fi
          mkdir -p "$SHOTS_DIR/baseline" # 初回（ベースライン未生成）でも reg-cli は全画像を newItems として扱える

          # 比較結果は RUNNER_TEMP 側に生成しておく（push リトライで reset --hard しても
          # コピーし直すだけで再適用できるようにするため）
          PR_OUT="$RUNNER_TEMP/pr-out"
          rm -rf "$PR_OUT"
          mkdir -p "$PR_OUT/actual" "$PR_OUT/diff"
          cp "$ACTUAL_SRC"/*.png "$PR_OUT/actual/"

          # -M: サブピクセルの描画揺れを吸収する色差閾値（実データを見てチューニングする）
          # -I: 差分があってもここでは exit 0（report-only 運用。差分の判断はレビュアーが行う）
          # diff 出力はデフォルトで PNG（0.18.16 で確認済み）
          mobile/node_modules/.bin/reg-cli \
            "$PR_OUT/actual" "$SHOTS_DIR/baseline" "$PR_OUT/diff" \
            -J "$RUNNER_TEMP/reg.json" -R "$PR_OUT/report/index.html" \
            -M 0.05 -I

          apply_pr_results() {
            rm -rf "${SHOTS_DIR:?}/${PR_DIR}"
            cp -R "$PR_OUT" "$SHOTS_DIR/$PR_DIR"
            git -C "$SHOTS_DIR" add -A
            git -C "$SHOTS_DIR" commit -m "${PR_DIR}: screenshots from ${GITHUB_SHA}" || echo "スクショに変更なし"
          }
          apply_pr_results
          push_with_retry apply_pr_results
          HEAD_SHA=$(git -C "$SHOTS_DIR" rev-parse HEAD)

          node mobile/scripts/vrt/generate-comment.js \
            --reg "$RUNNER_TEMP/reg.json" \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$HEAD_SHA" \
            --pr-dir "$PR_DIR" \
            --run-url "$RUN_URL" \
            --maestro-status "$MAESTRO_STATUS" \
            --baseline-sha "$BASELINE_SHA" > "$RUNNER_TEMP/comment.md"

          upsert_sticky_comment "$RUNNER_TEMP/comment.md"
