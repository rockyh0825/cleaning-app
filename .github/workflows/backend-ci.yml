name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "api/openapi.yaml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    # paths フィルターを外す
    # → PRでは常にジョブを起動してステータスを報告し、ブランチ保護ルールを満たす
    # → バックエンド変更がないPRは内部の paths-filter でステップをスキップして高速に通過する

permissions:
  contents: read
  pull-requests: read  # dorny/paths-filter が PR の差分を GitHub API 経由で取得するために必要

jobs:
  ci:
    name: ktlint / Detekt / Test (Konsist)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cleaning_app
          POSTGRES_USER: cleaning
          POSTGRES_PASSWORD: cleaning
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Detect backend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'api/openapi.yaml'
              - '.github/workflows/backend-ci.yml'

      - name: Set up JDK 21
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        if: steps.filter.outputs.backend == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Generate API client (Kotlin)
        if: steps.filter.outputs.backend == 'true'
        working-directory: backend
        run: ./gradlew openApiGenerate

      - name: ktlint check
        if: steps.filter.outputs.backend == 'true'
        working-directory: backend
        run: ./gradlew ktlintCheck

      - name: Detekt
        if: steps.filter.outputs.backend == 'true'
        working-directory: backend
        run: ./gradlew detekt

      - name: Test (JUnit 5 + Konsist)
        if: steps.filter.outputs.backend == 'true'
        working-directory: backend
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cleaning_app
          SPRING_DATASOURCE_USERNAME: cleaning
          SPRING_DATASOURCE_PASSWORD: cleaning

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/build/reports/tests/
