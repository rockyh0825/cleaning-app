name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  ci:
    name: ktlint / Detekt / Test (Konsist)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cleaning_app
          POSTGRES_USER: cleaning
          POSTGRES_PASSWORD: cleaning
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint check
        working-directory: backend
        run: ./gradlew ktlintCheck

      - name: Detekt
        working-directory: backend
        run: ./gradlew detekt

      - name: Test (JUnit 5 + Konsist)
        working-directory: backend
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cleaning_app
          SPRING_DATASOURCE_USERNAME: cleaning
          SPRING_DATASOURCE_PASSWORD: cleaning

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/build/reports/tests/
