openapi: 3.1.0
info:
  title: Cleaning App API
  version: 0.1.0
  description: |
    一人暮らし向け掃除管理アプリのAPI。
    契約ファースト（ADR-003）の唯一の正本。このファイルからクライアント・サーバースタブを生成する。

servers:
  - url: http://localhost:8080
    description: ローカル開発

# MVPは認証なし（X-User-Idヘッダで識別）。V2でKeycloak/JWTに移行予定
security: []

# ───────────────────────────────────────────────
# 再利用する部品（スキーマ・パラメータ）は components に置き、$ref で参照する
# ───────────────────────────────────────────────
components:
  parameters:
    # MVPは認証なし。初回起動時に発行したUUIDを X-User-Id ヘッダで渡して識別する
    # （V2でKeycloak導入時はJWTに置き換わるが、契約上はここを差し替えるだけで済む）
    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      description: 初回起動時に発行したユーザーUUID
      schema:
        type: string
        format: uuid

  schemas:
    RoomType:
      type: string
      description: 部屋の種別。プリセットパーツのseedに使う
      enum: [KITCHEN, BATHROOM, BEDROOM, LIVING, TOILET, OTHER]

    OwnerType:
      type: string
      description: パーツの所属対象種別
      enum: [ROOM, FURNITURE]

    # サーバーが「返す」部屋。id・タイムスタンプ込み（＝サーバーが確定させる値）
    Room:
      type: object
      required: [id, name, type, gridX, gridY, gridW, gridH, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: リビング
        type:
          $ref: '#/components/schemas/RoomType'
        gridX:
          type: integer
          description: 左上セルX（グリッド座標）
        gridY:
          type: integer
          description: 左上セルY（グリッド座標）
        gridW:
          type: integer
          description: 幅（セル数）
        gridH:
          type: integer
          description: 高さ（セル数）
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # 部屋の「作成入力」。id・userId・タイムスタンプは含めない
    # → これらはサーバーが生成する値で、クライアントに送らせてはいけないため、入力スキーマと出力スキーマを分ける
    RoomCreate:
      type: object
      required: [name, type, gridX, gridY, gridW, gridH]
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/RoomType'
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer

    # 部屋の「更新入力」。省略したフィールドは変更しない（部分更新）
    RoomUpdate:
      type: object
      description: 指定したフィールドのみ更新する。すべて省略可能だが、少なくとも1つ指定すること
      minProperties: 1
      properties:
        name:
          type: string
        gridX:
          type: integer
          description: 左上セルX（グリッド座標）
        gridY:
          type: integer
          description: 左上セルY（グリッド座標）
        gridW:
          type: integer
          description: 幅（セル数）
        gridH:
          type: integer
          description: 高さ（セル数）

    # サーバーが「返す」家具
    Furniture:
      type: object
      required: [id, roomId, name, gridX, gridY, gridW, gridH, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        roomId:
          type: string
          format: uuid
          description: 所属する部屋のID
        name:
          type: string
          example: ソファ
        presetKey:
          anyOf:
            - type: string
            - type: 'null'
          description: プリセット由来なら識別キー。自由名称で追加した場合はnull
          example: sofa
        gridX:
          type: integer
          description: 部屋内の相対セルX（部屋左上が原点）
        gridY:
          type: integer
          description: 部屋内の相対セルY
        gridW:
          type: integer
          description: 幅（セル数）
        gridH:
          type: integer
          description: 高さ（セル数）
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # 家具の「作成入力」
    FurnitureCreate:
      type: object
      required: [name, gridX, gridY, gridW, gridH]
      properties:
        name:
          type: string
        presetKey:
          anyOf:
            - type: string
            - type: 'null'
          description: プリセット由来なら識別キー。自由名称の場合は省略またはnull
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer

    # 家具の「更新入力」。省略したフィールドは変更しない（部分更新）
    FurnitureUpdate:
      type: object
      description: 指定したフィールドのみ更新する。すべて省略可能だが、少なくとも1つ指定すること
      minProperties: 1
      properties:
        name:
          type: string
        gridX:
          type: integer
          description: 部屋内の相対セルX
        gridY:
          type: integer
          description: 部屋内の相対セルY
        gridW:
          type: integer
          description: 幅（セル数）
        gridH:
          type: integer
          description: 高さ（セル数）

    # 掃除単位。cleaning-record featureと共有するエンティティ
    # 間取りエディタが生成し（部屋種別によりseed）、cleaning-recordが掃除状態を更新する
    Part:
      type: object
      required: [id, ownerType, ownerId, name, recommendedCycleDays, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        ownerType:
          $ref: '#/components/schemas/OwnerType'
        ownerId:
          type: string
          format: uuid
          description: Room.id または Furniture.id
        name:
          type: string
          example: 床
        recommendedCycleDays:
          type: integer
          description: 推奨掃除周期（日）
          example: 7
        lastCleanedAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          description: 最終掃除日時。未掃除の場合はnull
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # パーツの「作成入力」。ownerType/ownerId/nameは必須。recommendedCycleDaysのデフォルトは7日
    PartCreate:
      type: object
      required: [ownerType, ownerId, name]
      properties:
        ownerType:
          $ref: '#/components/schemas/OwnerType'
        ownerId:
          type: string
          format: uuid
          description: Room.id または Furniture.id
        name:
          type: string
          example: 床
        recommendedCycleDays:
          type: integer
          description: 推奨掃除周期（日）。省略時はサーバーが7日を設定
          default: 7
          example: 7

    # パーツの「更新入力」。省略したフィールドは変更しない（部分更新）
    PartUpdate:
      type: object
      description: 指定したフィールドのみ更新する。すべて省略可能だが、少なくとも1つ指定すること
      minProperties: 1
      properties:
        name:
          type: string
          example: 床
        recommendedCycleDays:
          type: integer
          description: 推奨掃除周期（日）
          example: 14

    # サーバーが「返す」掃除記録
    CleaningRecord:
      type: object
      required: [id, partId, cleanedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        partId:
          type: string
          format: uuid
          description: 掃除したパーツのID
        cleanedAt:
          type: string
          format: date-time
          description: 掃除した日時
        note:
          anyOf:
            - type: string
            - type: 'null'
          description: 掃除メモ。未設定の場合はnull
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # 掃除記録の「作成入力」。複数パーツを一括登録する
    CleaningRecordCreate:
      type: object
      required: [partIds]
      properties:
        partIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          description: 一括記録するパーツIDのリスト（1件以上）
        cleanedAt:
          type: string
          format: date-time
          description: 掃除した日時。省略時はサーバーの現在時刻を使用
        note:
          anyOf:
            - type: string
            - type: 'null'
          description: 掃除メモ（省略可）

    # 掃除記録の「更新入力」。省略したフィールドは変更しない（部分更新）
    CleaningRecordUpdate:
      type: object
      description: 指定したフィールドのみ更新する。すべて省略可能だが、少なくとも1つ指定すること
      minProperties: 1
      properties:
        cleanedAt:
          type: string
          format: date-time
          description: 掃除した日時
        note:
          anyOf:
            - type: string
            - type: 'null'
          description: 掃除メモ

    # 掃除記録の一覧（ページング付き）
    CleaningRecordList:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CleaningRecord'
          description: 掃除記録の一覧
        total:
          type: integer
          description: 絞り込み条件に合致する総件数
        page:
          type: integer
          description: 現在のページ番号（1始まり）
        pageSize:
          type: integer
          description: 1ページあたりの件数

    # 期限超過パーツの情報。heatmap・notification 向け
    OverdueArea:
      type: object
      required: [partId, partName, lastCleanedAt, recommendedCycleDays, elapsedRatio]
      properties:
        partId:
          type: string
          format: uuid
          description: 期限超過しているパーツのID
        partName:
          type: string
          description: パーツ名
          example: 床
        lastCleanedAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          description: 最終掃除日時。未掃除の場合はnull
        recommendedCycleDays:
          type: integer
          description: 推奨掃除周期（日）
          example: 7
        elapsedRatio:
          type: number
          format: double
          description: 推奨周期に対する経過割合（elapsed days / recommendedCycleDays）。1.0超で期限超過
          example: 1.5

    # 家具を埋め込んだ部屋。GET /floorplan のレスポンスで使用
    RoomWithFurniture:
      allOf:
        - $ref: '#/components/schemas/Room'
        - type: object
          required: [furniture]
          properties:
            furniture:
              type: array
              items:
                $ref: '#/components/schemas/Furniture'

    # GET /floorplan のレスポンス。ユーザーの間取り全体（部屋＋家具）
    Floorplan:
      type: object
      required: [rooms]
      properties:
        rooms:
          type: array
          items:
            $ref: '#/components/schemas/RoomWithFurniture'


# ───────────────────────────────────────────────
# エンドポイント定義
# ───────────────────────────────────────────────
paths:
  /floorplan:
    get:
      summary: 間取り全体を取得する
      description: |
        ユーザーの間取り全体（部屋と各部屋に所属する家具）を一括取得する。
        間取り画面の初期ロードやTanStack Queryのキャッシュキーとして使用する。
      operationId: getFloorplan
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: 間取り全体
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Floorplan'
        '400':
          description: X-User-Idヘッダが不正

  /rooms:
    post:
      summary: 部屋を追加する
      description: グリッド座標と種別を指定して部屋を作成する。（種別に応じたプリセットパーツのseedは後のスライスで実装）
      operationId: createRoom
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreate'
      responses:
        '201':
          description: 作成された部屋
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '400':
          description: 入力が不正

    get:
      summary: 部屋一覧を取得する
      description: ユーザーの部屋一覧を取得する
      operationId: listRooms
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: 部屋一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Room'
        '400':
          description: 入力が不正

  /rooms/{roomId}:
    patch:
      summary: 部屋を更新する
      description: |
        部屋の名称・グリッド座標・サイズを部分更新する。
        指定しなかったフィールドは変更されない。
        座標変更時は内包する家具が部屋境界内に収まっていることをクライアントで事前検証する。
      operationId: updateRoom
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: roomId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomUpdate'
      responses:
        '200':
          description: 更新後の部屋
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '400':
          description: 入力が不正
        '404':
          description: 部屋が存在しない、または他ユーザーの部屋

    delete:
      summary: 部屋を削除する
      description: |
        部屋と、配下の家具・パーツをすべて削除する。
        連鎖削除はDBのON DELETE CASCADEで行う。
      operationId: deleteRoom
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: roomId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 削除成功
        '404':
          description: 部屋が存在しない、または他ユーザーの部屋

  /rooms/{roomId}/furniture:
    post:
      summary: 部屋に家具を追加する
      description: |
        指定した部屋内にグリッド座標を指定して家具を追加する。
        プリセットキーを指定するとプリセット由来の家具として記録される。
        座標はroomId の部屋内の相対セル位置で指定する。
      operationId: createFurniture
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: roomId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FurnitureCreate'
      responses:
        '201':
          description: 作成された家具
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Furniture'
        '400':
          description: 入力が不正
        '404':
          description: 部屋が存在しない、または他ユーザーの部屋

  /furniture/{furnitureId}:
    patch:
      summary: 家具を更新する
      description: |
        家具の名称・グリッド座標・サイズを部分更新する。
        指定しなかったフィールドは変更されない。
      operationId: updateFurniture
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: furnitureId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FurnitureUpdate'
      responses:
        '200':
          description: 更新後の家具
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Furniture'
        '400':
          description: 入力が不正
        '404':
          description: 家具が存在しない、または他ユーザーの家具

    delete:
      summary: 家具を削除する
      description: |
        家具と、配下のパーツをすべて削除する。
        連鎖削除はDBのON DELETE CASCADEで行う。
      operationId: deleteFurniture
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: furnitureId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 削除成功
        '404':
          description: 家具が存在しない、または他ユーザーの家具

  /cleaning-records:
    post:
      summary: 複数パーツの掃除記録を一括登録
      description: |
        指定した複数パーツの掃除を1トランザクションで一括記録する。
        各パーツの lastCleanedAt も同一トランザクション内で再計算する。
        cleanedAt を省略した場合、サーバーの現在時刻を使用する。
      operationId: createCleaningRecords
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleaningRecordCreate'
      responses:
        '201':
          description: 作成された掃除記録のリスト
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CleaningRecord'
        '400':
          description: 入力が不正（partIdsが空など）

    get:
      summary: 掃除記録の履歴を取得（絞り込み・ページング）
      description: |
        ユーザーの掃除記録履歴を取得する。
        partId で絞り込み、page/pageSizeでページングできる。
      operationId: listCleaningRecords
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: partId
          in: query
          required: false
          description: 絞り込むパーツID（省略時は全パーツ）
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          description: ページ番号（1始まり）
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: 1ページあたりの件数
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: 掃除記録の一覧（ページング付き）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningRecordList'
        '400':
          description: 入力が不正

  /cleaning-records/{recordId}:
    patch:
      summary: 掃除記録を修正（日時・メモ）
      description: |
        掃除記録の日時またはメモを部分更新する。
        cleanedAt を変更した場合、対象パーツの lastCleanedAt も同一トランザクション内で再計算する。
      operationId: updateCleaningRecord
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: recordId
          in: path
          required: true
          description: 更新する掃除記録のID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleaningRecordUpdate'
      responses:
        '200':
          description: 更新後の掃除記録
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleaningRecord'
        '400':
          description: 入力が不正
        '404':
          description: 掃除記録が存在しない、または他ユーザーの記録

    delete:
      summary: 掃除記録を削除
      description: |
        掃除記録を削除する。
        削除後、対象パーツの lastCleanedAt を同一トランザクション内で再計算する。
        記録がすべて消えた場合、lastCleanedAt は null になる。
      operationId: deleteCleaningRecord
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: recordId
          in: path
          required: true
          description: 削除する掃除記録のID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 削除成功
        '404':
          description: 掃除記録が存在しない、または他ユーザーの記録

  /parts:
    post:
      summary: パーツを作成（間取りエディタが呼ぶ）
      description: |
        指定した部屋または家具に属するパーツを作成する。
        ownerType と ownerId で所属先を指定する。
      operationId: createPart
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartCreate'
      responses:
        '201':
          description: 作成されたパーツ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Part'
        '400':
          description: 入力が不正

  /parts/{partId}:
    patch:
      summary: パーツの名前・推奨周期を更新
      description: |
        パーツの名称または推奨掃除周期を部分更新する。
        指定しなかったフィールドは変更されない。
      operationId: updatePart
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: partId
          in: path
          required: true
          description: 更新するパーツのID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartUpdate'
      responses:
        '200':
          description: 更新後のパーツ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Part'
        '400':
          description: 入力が不正
        '404':
          description: パーツが存在しない、または他ユーザーのパーツ

    delete:
      summary: パーツを削除（関連掃除記録も連鎖削除）
      description: |
        パーツを削除する。
        紐付く掃除記録はDBのON DELETE CASCADEで連鎖削除される。
      operationId: deletePart
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: partId
          in: path
          required: true
          description: 削除するパーツのID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 削除成功
        '404':
          description: パーツが存在しない、または他ユーザーのパーツ
